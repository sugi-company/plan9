<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ビットコイン価格推移</title>
    <style>
        body {
            font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a1a 0%, #232526 100%);
        }
        .tradingview-widget-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <!-- TradingView ウィジェット埋め込み開始 -->
    <div class="tradingview-widget-container" id="tradingview-widget-container-nikkei">
      <div class="tradingview-widget-container__widget-nikkei"></div>
    </div>
    <div class="tradingview-widget-container" id="tradingview-widget-container-gold" style="margin-top:20px;">
      <div class="tradingview-widget-container__widget-gold"></div>
    </div>
    <div class="tradingview-widget-container" id="tradingview-widget-container-btc" style="margin-top:20px;">
      <div class="tradingview-widget-container__widget-btc"></div>
    </div>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
      new TradingView.widget({
        "width": "100%",
        "height": 300,
        "symbol": "NIKKEI",
        "interval": "D",
        "timezone": "Asia/Tokyo",
        "theme": "dark",
        "style": "1",
        "locale": "ja",
        "toolbar_bg": "#1a1a1a",
        "enable_publishing": false,
        "hide_top_toolbar": false,
        "save_image": false,
        "container_id": "tradingview-widget-container__widget-nikkei"
      });
      new TradingView.widget({
        "width": "100%",
        "height": 300,
        "symbol": "OANDA:XAUUSD",
        "interval": "D",
        "timezone": "Asia/Tokyo",
        "theme": "dark",
        "style": "1",
        "locale": "ja",
        "toolbar_bg": "#1a1a1a",
        "enable_publishing": false,
        "hide_top_toolbar": false,
        "save_image": false,
        "container_id": "tradingview-widget-container__widget-gold"
      });
      new TradingView.widget({
        "width": "100%",
        "height": 300,
        "symbol": "BITFLYER:BTCJPY",
        "interval": "D",
        "timezone": "Asia/Tokyo",
        "theme": "dark",
        "style": "1",
        "locale": "ja",
        "toolbar_bg": "#1a1a1a",
        "enable_publishing": false,
        "hide_top_toolbar": false,
        "save_image": false,
        "container_id": "tradingview-widget-container__widget-btc"
      });
    </script>
    <!-- TradingView ウィジェット埋め込み終了 -->
</body>
</html>
